{% extends "base.html" %} {% block content %}

<div class="card">
  <div class="card-header">
    <h3>Update Employee</h3>
  </div>

  <div class="card-body">
    <form action="/employee/employeeUpdate/{{employee.id}}" method="POST">
        <div class="mb-3">
            <label>Name : </label>
            <input type="text" name="name" value="{{employee.name}}" class="form-control px-4" required>
        </div>

        <div class="mb-3">
            <label>Email : </label>
            <input type="email" name="email" value="{{employee.email}}" class="form-control px-4" required>
        </div>

        <div class="mb-3">
            <label>Password : </label>
            <input type="text" name="password" value="{{employee.password}}" class="form-control px-4" required>
        </div>

        <div class="mb-3">
            <label>Salary : </label>
            <input type="text" name="salary" value="{{employee.salary}}" class="form-control px-4" required>
        </div>
        <div class="mb-3">
            <label>Department : </label>
            <input type="text" name="department" value="{{employee.department}}" class="form-control px-4" required>
        </div>

        <button class="btn btn-warning"> Update </button>
        <button class="btn btn-primary"> Reset </button>
    </form>
  </div>
</div>

{% endblock %}
