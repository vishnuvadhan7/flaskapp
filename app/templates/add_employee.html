{% extends "base.html" %} {% block content %}

<div class="card">
  <div class="card-header">
    <h3>Add Employee</h3>
  </div>

  <div class="card-body">
    <form action="/employee/register" method="POST">
        <div class="mb-3">
            <label>Name : </label>
            <input type="text" name="name" class="form-control px-4">
        </div>
        <div class="mb-3">
            <label>Salary : </label>
            <input type="text" name="salary" class="form-control px-4">
        </div>
        <div class="mb-3">
            <label>Department : </label>
            <input type="text" name="department" class="form-control px-4">
        </div>

        <button class="btn btn-success"> Submit </button>
        <button class="btn btn-primary"> Reset </button>
    </form>
  </div>
</div>

{% endblock %}
